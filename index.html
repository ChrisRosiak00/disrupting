<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>disrupting.com — Premium Domains</title>
  <meta name="description" content="Specialized premium domains for sale for your business, idea, or dream." />
  <meta property="og:title" content="disrupting.com — Premium Domains" />
  <meta property="og:description" content="Specialized premium domains for sale for your business, idea, or dream." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://disrupting.com" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%97%89%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #ffffff;
      color: #0a0a0a;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      overflow-x: hidden;
    }
    .grid-bg {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px);
      background-size: 56px 56px;
      mask-image: radial-gradient(ellipse at center, rgba(0,0,0,0.9) 0%, transparent 75%);
      -webkit-mask-image: radial-gradient(ellipse at center, rgba(0,0,0,0.9) 0%, transparent 75%);
      pointer-events: none;
      z-index: 0;
    }
    header, main, footer { position: relative; z-index: 1; }
    header {
      padding: 28px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: -0.01em;
    }
    .brand .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #0a0a0a;
    }
    .badge {
      font-size: 12px;
      color: #6a6a6a;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-weight: 500;
    }
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 64px 32px;
      text-align: center;
    }
    .eyebrow {
      font-size: 13px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #6a6a6a;
      font-weight: 500;
      margin-bottom: 28px;
    }
    h1 {
      font-size: clamp(56px, 11vw, 168px);
      font-weight: 800;
      letter-spacing: -0.045em;
      line-height: 0.92;
      margin-bottom: 32px;
      max-width: 1100px;
    }
    h1 .accent {
      background: linear-gradient(135deg, #0a0a0a 0%, #4a4a4a 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subhead {
      font-size: clamp(17px, 1.6vw, 21px);
      color: #4a4a4a;
      max-width: 580px;
      line-height: 1.55;
      font-weight: 400;
      margin-bottom: 48px;
    }
    .cta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 22px;
      background: #0a0a0a;
      color: #ffffff;
      border-radius: 999px;
      font-size: 15px;
      font-weight: 500;
      text-decoration: none;
      transition: transform 0.2s ease, background 0.2s ease;
    }
    .cta:hover {
      background: #1f1f1f;
      transform: translateY(-1px);
    }
    .cta .arrow {
      transition: transform 0.2s ease;
    }
    .cta:hover .arrow {
      transform: translateX(2px);
    }
    footer {
      padding: 28px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      font-size: 14px;
      color: #6a6a6a;
      border-top: 1px solid rgba(0,0,0,0.06);
    }
    footer a {
      color: #0a0a0a;
      text-decoration: none;
      font-weight: 500;
      transition: opacity 0.2s ease;
    }
    footer a:hover { opacity: 0.6; }
    @media (max-width: 600px) {
      header, footer { padding: 20px 24px; }
      footer { flex-direction: column; align-items: flex-start; gap: 4px; }
      main { padding: 48px 24px; }
    }
  </style>
</head>
<body>
  <div class="grid-bg" aria-hidden="true"></div>

  <header>
    <div class="brand">
      <span class="dot"></span>
      <span>disrupting.com</span>
    </div>
    <span class="badge">Domain Portfolio</span>
  </header>

  <main>
    <div class="eyebrow">Premium Domain Portfolio</div>
    <h1>disrupting<span class="accent">.com</span> premium domains</h1>
    <p class="subhead">Specialized premium domains for sale for your business, idea, or dream.</p>
    <a href="mailto:contact@disrupting.com" class="cta">
      <span>contact@disrupting.com</span>
      <span class="arrow" aria-hidden="true">→</span>
    </a>
  </main>

  <footer>
    <span>© 2026 disrupting.com</span>
    <a href="mailto:contact@disrupting.com">contact@disrupting.com</a>
  </footer>
</body>
</html>
